<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGBreeder Gene Editor</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🧬 PGBreeder Gene Editor</h1>
            <p>Edit Project Gorgon pet genetics data with ease</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <div class="form-group">
                    <label for="animalType">Animal Type</label>
                    <select id="animalType">
                        <option value="">Select animal type...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="chromosome">Chromosome</label>
                    <select id="chromosome" disabled>
                        <option value="">Select chromosome...</option>
                    </select>
                </div>
                <button class="load-btn" id="loadGenes" disabled>Load Genes</button>
                <button class="export-btn" id="exportChromosome" disabled>📥 Export Chromosome</button>
                <button class="export-btn" id="exportAll" disabled>📦 Export All</button>
            </div>
        </div>

        <!-- Effect Color Legend -->
        <div class="effect-legend" style="display: none;" id="effectLegend">
            <h4>🎨 Effect Color Guide</h4>
            <div class="legend-badges">
                <span class="legend-badge positive">+ Positive</span>
                <span class="legend-badge negative">- Negative</span>
                <span class="legend-badge neutral">None</span>
            </div>
            <div class="legend-grid">
                <div class="legend-item">
                    <div class="legend-color legend-intelligence"></div>
                    <span>Intelligence</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-toughness"></div>
                    <span>Toughness</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-speed"></div>
                    <span>Speed</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-friendliness"></div>
                    <span>Friendliness</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-ruggedness"></div>
                    <span>Ruggedness</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-ferocity"></div>
                    <span>Ferocity</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-enthusiasm"></div>
                    <span>Enthusiasm</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-virility"></div>
                    <span>Virility</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-loyalty"></div>
                    <span>Loyalty</span>
                </div>
            </div>
        </div>

        <div class="genes-container">
            <div id="genesContent">
                <div class="loading">
                    Select an animal type and chromosome to begin editing genes
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script src="/static/js/ui-utils.js"></script>
    <script src="/static/js/api-client.js"></script>
    <script src="/static/js/gene-manager.js"></script>
    <script src="/static/js/export-manager.js"></script>
    <script src="/static/js/app-controller.js"></script>
</body>

</html>
