name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"

    - name: Create virtual environment
      run: uv venv

    - name: Install dependencies
      run: |
        uv pip install --upgrade pip
        uv sync --dev

    - name: Install test dependencies
      run: |
        uv pip install pytest pytest-cov pytest-timeout pytest-mock

    - name: Lint with ruff
      run: |
        uv run ruff check src/ tests/
        uv run ruff format --check src/ tests/

    - name: Type check with mypy
      run: |
        uv run mypy src/

    - name: Run integration tests
      run: |
        uv run python scripts/run_integration_tests.py --coverage --categories

    - name: Run performance tests
      run: |
        uv run python scripts/run_integration_tests.py --performance

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.13'
      with:
        file: ./htmlcov/coverage.xml
        flags: integration
        name: integration-tests

    - name: Archive test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          htmlcov/
          .pytest_cache/

  api-compatibility-check:
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v2

    - name: Install dependencies
      run: |
        uv venv
        uv sync --dev

    - name: Test API endpoint availability
      run: |
        # Start the web app in background
        uv run python scripts/run_web_app.py &
        WEB_PID=$!

        # Wait for server to start
        sleep 10

        # Test critical API endpoints
        echo "Testing API endpoints..."

        # Animal types
        curl -f http://localhost:8000/api/animal-types || exit 1

        # Chromosomes
        curl -f http://localhost:8000/api/chromosomes/horse || exit 1

        # Effect options
        curl -f http://localhost:8000/api/effect-options || exit 1

        # Genes (this will be empty but should not error)
        curl -f http://localhost:8000/api/genes/horse/01 || exit 1

        # Stop the web app
        kill $WEB_PID

        echo "✅ All critical API endpoints are responding"

  database-compatibility-check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        db-backend: ["duckdb", "ducklake"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v2

    - name: Install dependencies
      run: |
        uv venv
        uv sync --dev

    - name: Test database backend - ${{ matrix.db-backend }}
      run: |
        # Set database configuration
        export GORGONETICS_DB_BACKEND=${{ matrix.db-backend }}

        if [ "${{ matrix.db-backend }}" = "ducklake" ]; then
          export GORGONETICS_CATALOG_TYPE=sqlite
          export GORGONETICS_CATALOG_PATH=test_metadata.sqlite
          export GORGONETICS_DATA_PATH=test_data
        else
          export GORGONETICS_DUCKDB_PATH=test_gorgonetics.db
        fi

        # Test database creation and basic operations
        uv run python -c "
        from src.gorgonetics.database_config import create_database_instance

        print('Testing database backend: ${{ matrix.db-backend }}')

        # Create database instance
        db = create_database_instance()
        print('✅ Database instance created')

        # Test basic operations
        animal_types = db.get_animal_types()
        print(f'✅ Animal types: {animal_types}')

        # Test gene insertion
        db._upsert_gene('test', '01', 'TEST1', {
            'effect_dominant': 'None',
            'effect_recessive': 'Test+',
            'appearance': 'Test appearance',
            'notes': 'Test notes'
        })
        print('✅ Gene insertion works')

        # Test gene retrieval
        genes = db.get_genes_by_chromosome('test', '01')
        assert len(genes) > 0
        print(f'✅ Gene retrieval works: {len(genes)} genes')

        print('✅ Database backend ${{ matrix.db-backend }} is working correctly')
        "

  test-summary:
    runs-on: ubuntu-latest
    needs: [integration-tests, api-compatibility-check, database-compatibility-check]
    if: always()

    steps:
    - name: Check test results
      run: |
        echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
        echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY

        if [ "${{ needs.integration-tests.result }}" = "success" ]; then
          echo "| Integration Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Integration Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.api-compatibility-check.result }}" = "success" ]; then
          echo "| API Compatibility | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| API Compatibility | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.database-compatibility-check.result }}" = "success" ]; then
          echo "| Database Compatibility | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Database Compatibility | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
        fi

        # Overall status
        if [ "${{ needs.integration-tests.result }}" = "success" ] &&
           [ "${{ needs.api-compatibility-check.result }}" = "success" ] &&
           [ "${{ needs.database-compatibility-check.result }}" = "success" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **All tests passed!** UI functionality should work correctly." >> $GITHUB_STEP_SUMMARY
        else
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Some tests failed!** UI functionality may be affected." >> $GITHUB_STEP_SUMMARY
        fi
