name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install JS dependencies
        run: pnpm install

      - name: Build Tauri app (release)
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Gorgonetics ${{ github.ref_name }}"
          releaseBody: "See the [commit log](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

      - name: Build Tauri app (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload build artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  publish-genes-zip:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build genes zip and manifest
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          ZIP_NAME="gorgonetics-genes.zip"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          STAGE="$(mktemp -d)/gorgonetics-genes"
          mkdir -p "$STAGE"
          cp -R assets "$STAGE/"

          HORSE_COUNT=$(find "$STAGE/assets/horse" -maxdepth 1 -name '*.json' | wc -l | tr -d ' ')
          BEEWASP_COUNT=$(find "$STAGE/assets/beewasp" -maxdepth 1 -name '*.json' | wc -l | tr -d ' ')

          cat > "$STAGE/MANIFEST.json" <<EOF
          {
            "version": "${VERSION}",
            "tag": "${TAG}",
            "buildDate": "${BUILD_DATE}",
            "species": {
              "horse": ${HORSE_COUNT},
              "beewasp": ${BEEWASP_COUNT}
            },
            "format": {
              "fields": ["gene", "effectDominant", "effectRecessive", "appearance", "breed", "notes"]
            },
            "source": "https://github.com/${{ github.repository }}/tree/${TAG}/assets"
          }
          EOF

          find "$STAGE" \( -name '.DS_Store' -o -name 'Thumbs.db' \) -delete
          (cd "$(dirname "$STAGE")" && zip -r "${GITHUB_WORKSPACE}/${ZIP_NAME}" "$(basename "$STAGE")")
          unzip -l "${GITHUB_WORKSPACE}/${ZIP_NAME}" | tail -20
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "${ZIP_NAME}" --repo "${{ github.repository }}" --clobber
