name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run integration tests daily at 6 AM UTC
    - cron: "0 6 * * *"

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Test package installation
        run: |
          uv run python -c "import gorgonetics; print(f'Package version: {gorgonetics.__version__}')"

      - name: Test CLI functionality
        run: |
          echo "Testing CLI version command..."
          uv run gorgonetics --version

          echo "Testing CLI help command..."
          uv run gorgonetics --help

      - name: Test database operations
        run: |
          echo "Testing database initialization..."
          uv run python -c "
          from gorgonetics.database_config import create_database_instance
          import tempfile
          import os
          
          # Create temporary database for testing
          temp_dir = tempfile.mkdtemp()
          os.environ['GORGONETICS_DB_BACKEND'] = 'ducklake'
          os.environ['GORGONETICS_CATALOG_TYPE'] = 'sqlite'
          os.environ['GORGONETICS_CATALOG_PATH'] = os.path.join(temp_dir, 'test.sqlite')
          os.environ['GORGONETICS_DATA_PATH'] = os.path.join(temp_dir, 'data')
          
          # Test database creation
          db = create_database_instance()
          print('Database created successfully')
          
          # Test basic operations
          animal_types = db.get_animal_types()
          print(f'Animal types: {animal_types}')
          
          # Cleanup
          import shutil
          shutil.rmtree(temp_dir)
          print('Database cleanup completed')
          "

      - name: Test genome parser
        run: |
          echo "Testing genome parser functionality..."
          uv run python -c "
          from gorgonetics.genome_parser import count_blocks_in_chromosome, generate_block_letters

          # Test basic parsing functions
          blocks = count_blocks_in_chromosome('AABBCCDD')
          print(f'Block count test: {blocks}')

          letters = generate_block_letters(4)
          print(f'Block letters test: {letters}')
          "

      - name: Test web app import and basic functionality
        run: |
          echo "Testing web app import..."
          uv run python -c "
          from gorgonetics.web_app import app
          print('Web app imported successfully')

          # Test FastAPI app creation
          from fastapi.testclient import TestClient
          client = TestClient(app)
          print('Test client created successfully')
          "

      - name: Test data models
        run: |
          echo "Testing data models..."
          uv run python -c "
          from gorgonetics.models import Gene, GeneType, Genome, Pet, BeeWaspAttributes

          # Test basic model creation with correct fields
          gene = Gene(
              chromosome='01',
              block='A',
              position=1,
              gene_type=GeneType.DOMINANT
          )
          print(f'Gene model test: {gene.chromosome}{gene.block}{gene.position}')

          # Test GeneType enum values
          print(f'GeneType values: {[gt.value for gt in GeneType]}')

          # Test BeeWaspAttributes model
          attrs = BeeWaspAttributes(intelligence=75, toughness=60, ferocity=80)
          print(f'BeeWaspAttributes test: intelligence={attrs.intelligence}, ferocity={attrs.ferocity}')

          # Test successful model creation with different gene types
          gene_types = [GeneType.DOMINANT, GeneType.RECESSIVE, GeneType.MIXED, GeneType.UNKNOWN]
          for gt in gene_types:
              test_gene = Gene(
                  chromosome='02',
                  block='B',
                  position=2,
                  gene_type=gt
              )
              print(f'✓ Created gene: {test_gene.chromosome}{test_gene.block}{test_gene.position} = {test_gene.gene_type.value}')
          "

      - name: Test script functionality
        run: |
          echo "Testing script imports..."
          uv run python -c "
          import sys
          from pathlib import Path

          # Add scripts to path
          scripts_path = Path('scripts')
          sys.path.insert(0, str(scripts_path))

          # Test script imports that exist
          import generate_gene_templates

          print('All scripts imported successfully')
          "

      - name: Test full application workflow
        run: |
          echo "Testing end-to-end workflow..."
          uv run python -c "
          import tempfile
          import os
          import shutil
          from pathlib import Path
          from gorgonetics.database_config import create_database_instance

          # Create temporary directory for database
          temp_dir = tempfile.mkdtemp()
          os.environ['GORGONETICS_DB_BACKEND'] = 'ducklake'
          os.environ['GORGONETICS_CATALOG_TYPE'] = 'sqlite'
          os.environ['GORGONETICS_CATALOG_PATH'] = os.path.join(temp_dir, 'test.sqlite')
          os.environ['GORGONETICS_DATA_PATH'] = os.path.join(temp_dir, 'data')

          try:
              # Initialize database
              db = create_database_instance()
              print('✓ Database initialized')

              # Test database operations
              print('✓ Database connection established')

              # Test that we can query existing data
              animal_types = db.get_animal_types()
              print(f'✓ Animal types available: {len(animal_types)}')

              # Test basic database queries
              if animal_types:
                  first_animal = animal_types[0]
                  chromosomes = db.get_chromosomes(first_animal)
                  print(f'✓ Chromosomes for {first_animal}: {len(chromosomes)}')

                  if chromosomes:
                      genes = db.get_genes_by_chromosome(first_animal, chromosomes[0])
                      print(f'✓ Genes found: {len(genes)}')
              else:
                  print('✓ Database schema created (no data loaded yet)')

              # Clean up is handled by context manager
              print('✓ Database operations completed')

          finally:
              # Remove temporary directory
              if os.path.exists(temp_dir):
                  shutil.rmtree(temp_dir)
              print('✓ Cleanup completed')

          print('🎉 End-to-end workflow test passed!')
          "

  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install build dependencies
        run: uv sync --dev

      - name: Test package build
        run: |
          echo "Testing package build..."
          uv build

          echo "Checking build artifacts..."
          ls -la dist/

          echo "Testing wheel installation..."
          pip install dist/*.whl

          echo "Testing installed package..."
          python -c "import gorgonetics; print('Wheel installation successful')"

      - name: Clean up build artifacts
        run: rm -rf dist/ build/
