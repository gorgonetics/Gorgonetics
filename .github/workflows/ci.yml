name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage
        run: uv run pytest -v --cov=gorgonetics --cov-report=xml --cov-report=term

      - name: Test CLI functionality
        run: |
          uv run gorgonetics --version
          uv run gorgonetics --help
          uv run python -c "from gorgonetics.cli import app; print('CLI import successful')"

      - name: Test web app import
        run: uv run python -c "from gorgonetics.web_app import app; print('Web app import successful')"

      - name: Test core imports
        run: |
          uv run python -c "from gorgonetics.models import Gene, GeneType, Genome, Pet, BeeWaspAttributes; print('Models imported successfully')"
          uv run python -c "from gorgonetics.database_config import create_database_instance; print('Database config imported successfully')"
          uv run python -c "from gorgonetics.attribute_config import AttributeConfig; print('Attribute config imported successfully')"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        if: matrix.os == 'ubuntu-latest'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Check ruff linting
        run: uv run ruff check --output-format=github .

      - name: Check ruff formatting
        run: uv run ruff format --check .

      - name: Run type checking
        run: uv run ty check src/gorgonetics

  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install JavaScript dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm run lint:ci

  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install build dependencies
        run: uv sync --dev

      - name: Test package build
        run: |
          echo "Testing package build..."
          uv build

          echo "Checking build artifacts..."
          ls -la dist/

          echo "Testing wheel installation..."
          uv pip install dist/*.whl

          echo "Testing installed package..."
          uv run python -c "import gorgonetics; print('Wheel installation successful')"

      - name: Clean up build artifacts
        run: rm -rf dist/ build/